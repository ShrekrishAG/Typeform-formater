services:
  - type: web
    name: typeform-formatter
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: WEBHOOK_SECRET
        sync: false
      - key: HR_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: FORM_TITLE
        sync: false
      - key: COMPANY_NAME
        sync: false
